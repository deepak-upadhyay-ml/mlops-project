apiVersion: apps/v1
kind: Deployment

metadata:
  name: flask-app-deployment
  labels:
    app: flask-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: flask-app

  template:
    metadata:
      labels:
        app: flask-app

    spec:
      containers:

      - name: flask-app

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 5000

        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"

          limits:
            memory: "1Gi"
            cpu: "1"

        env:

        - name: MLOPS_TEST
          valueFrom:
            secretKeyRef:
              name: mlops-secret
              key: MLOPS_TEST

        - name: DAGSHUB_USERNAME
          valueFrom:
            secretKeyRef:
              name: mlops-secret
              key: DAGSHUB_USERNAME

---

apiVersion: v1
kind: Service

metadata:
  name: flask-app-service

spec:
  type: LoadBalancer

  selector:
    app: flask-app

  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
